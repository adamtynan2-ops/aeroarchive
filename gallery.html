  <!-- Image Slider -->
  <section class="content">
    <h2>Aircraft Gallery</h2>
    <div class="slider">
      <div class="slides-container">
        <img class="slide active" src="images/plane1.jpg" alt="Airplane 1">
        <img class="slide" src="images/plane2.jpg" alt="Airplane 2">
        <img class="slide" src="images/plane3.jpg" alt="Airplane 3">
      </div>
      <button class="prev-btn" onclick="prevSlide()">&#10094;</button>
      <button class="next-btn" onclick="nextSlide()">&#10095;</button>
      <div class="slide-dots">
        <span class="dot active" onclick="goToSlide(0)"></span>
        <span class="dot" onclick="goToSlide(1)"></span>
        <span class="dot" onclick="goToSlide(2)"></span>
      </div>
    </div>
  </section>

  <!-- Audio -->
  <section class="content">
    <h2>Jet Engine Sound</h2>
    <audio controls>
      <source src="audio/engine.mp3" type="audio/mpeg">
      Your browser does not support audio.
    </audio>
  </section>

  <!-- Video -->
<section class="content">
    <h2>Takeoff Video</h2>
    <div class="video-container">
      <iframe width="560" height="315"
        src="https://www.youtube.com/embed/SAN2PmZCSHU"
        title="Airplane Takeoff" frameborder="0"
        allowfullscreen></iframe>
    </div>
  </section>

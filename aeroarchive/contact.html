  <section class="content">
    <h2>Contact Us</h2>
    <form id="contactForm" onsubmit="validateForm(event)">

      <label for="name">Full Name:</label>
      <input type="text" id="name" name="name">
      <span class="error" id="nameError"></span>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email">
      <span class="error" id="emailError"></span>

      <label for="subject">Subject:</label>
      <select id="subject" name="subject">
        <option value="">-- Select --</option>
        <option value="general">General Inquiry</option>
        <option value="error">Report an Error</option>
        <option value="suggest">Suggest an Aircraft</option>
        <option value="other">Other</option>
      </select>
      <span class="error" id="subjectError"></span>

      <label>Favourite Aircraft Type:</label>
      <div class="radio-group">
        <label><input type="radio" name="type"
          value="commercial"> Commercial</label>
        <label><input type="radio" name="type"
          value="military"> Military</label>
        <label><input type="radio" name="type"
          value="private"> Private</label>
        <label><input type="radio" name="type"
          value="all"> All</label>
      </div>

      <label>Interests:</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="interest"
          value="history"> History</label>
        <label><input type="checkbox" name="interest"
          value="specs"> Specs</label>
        <label><input type="checkbox" name="interest"
          value="photos"> Photos</label>
        <label><input type="checkbox" name="interest"
          value="videos"> Videos</label>
      </div>

      <label for="message">Message:</label>
      <textarea id="message" name="message"
        rows="5"></textarea>
      <span class="error" id="messageError"></span>

      <label>
        <input type="checkbox" id="newsletter">
        Subscribe to newsletter
      </label>

      <button type="submit">Send Message</button>
    </form>
    <div id="successMessage" style="display:none;">
      Thank you! Your message has been sent.</div>
  </section>
